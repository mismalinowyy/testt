{q:"15. Za nadzór nad przewożoną bronią palną na lotniskach na których nie funkcjonuje lotnicze przejście graniczne odpowiada:",a:["a) Straż Graniczna","b) Służba Celno-Skarbowa","c) Służba Ochrony Lotniska","d) Policja"]},

{q:"19. Do przedmiotów zabronionych dla pasażerów do wnoszenia do strefy zastrzeżonej zaliczamy:",a:["a) naboje dymne","b) kij baseball","c) śrubokręt o długości trzonka 5cm","d) nóż do cięcia kartonów"]},

{q:"20. Do kategorii przedmiotów zabronionych w bagażu rejestrowanym zgodnie z Rozp 2015/1998 zaliczamy:",a:["a) ATP","b) heksogen","c) amunicja","d) pentryt"]},

{q:"21. Z kontroli bezpieczeństwa w trakcie wykonywania czynności służbowych zwolnieni są posiadający kartę identyfikacyjną danego portu lotniczego:",a:["a) pracownicy Polskiej Agencji Żeglugi Powietrznej","b) pracownicy ministerstwa infrastruktury","c) audytorzy Urzędu Lotnictwa Cywilnego","d) funkcjonariusze Służby Kontrwywiadu Wojskowego"]},

{q:"22. Ze sprawdzenia zwolnione są pojazdy posiadające przepustkę danego portu lotniczego:",a:["a) Centralnego Biura Antykorupcyjnego","b) Służby Celno-skarbowej","c) Wojsk obrony terytorialnej","d) wewnętrznej służby ochrony zarządzającego lotniskiem"]},

{q:"23. Do kontroli bezpieczeństwa bagażu rejestrowanego z wykorzystaniem urządzenia ETD pobiera się próbki z:",a:["a) zamków błyskawicznych","b) rączek bagażu","c) zamknięć danego bagażu","d) zewnętrznej podszewki bagażu"]},

{q:"24. Za zabezpieczony bagaż uznaje się bagaż rejestrowany:",a:["a) fizycznie chroniony przed możliwością wprowadzenia do niego jakichkolwiek przedmiotów","b) znajdujący się w strefie operacyjnej lotniska","c) odlatujący po przejściu kontroli bezpieczeństwa","d) oznaczony przez przewoźnika lotniczego"]},

{q:"25. Do metod kontroli bezpieczeństwa bagażu kabinowego zaliczamy zgodnie z Rozp. 2015/1998:",a:["a) ETD","b) kontrolę manualną","c) RTG","d) PWMW"]},

{q:"26. Do dodatkowych środków kontroli bezpieczeństwa pasażerów zaliczamy:",a:["a) urządzenie do prześwietlania osób niewykorzystujące promieniowania jonizującego","b) urządzenie do wykrywania śladowych ilości materii organicznych","c) ręczny wykrywacz metali","d) urządzenie HHMD"]},

{q:"27. Do kontroli bezpieczeństwa osób z wykorzystaniem ETD używa się próbek pobranych co najmniej z:",a:["a) z zapięć ubrań i zewnętrznej strony obwodu na wysokości pasa","b) zapięć ich ubrań oraz wierzchu ich ubrań","c) przedmiotu osobistego ostatnio dotykanego i z zapięć butów","d) z wierzchu i spodu dłoni i zapięć ich ubrań"]},

{q:"28. Do podstawowych metod kontroli bezpieczeństwa bagażu kabinowego zaliczamy:",a:["a) ETD","b) RTG","c) SED","d) EDS"]},

{q:"29. Bagaż bez właściciela:",a:["a) z powodu nieprzewidzianych okoliczności nie doszło do transferu bagażu z jednego lotu na drugi","b) pasażer opuścił statek powietrzny przed odlotem","c) pasażerowi odmówiono wejścia na pokład i zrezygnował on dobrowolnie z lotu","d) pasażera skierowano na inny lot, a zmiana ta nie nastąpiła na życzenie pasażera"]},

{q:"30. Do kategorii przedmiotów zabronionych w bagażu rejestrowanym zaliczamy:",a:["a) fajerwerki","b) naboje dymne","c) zapalniki","d) materiały pirotechniczne"]},

{q:"34. Bagaż rejestrowany uznaje się za zabezpieczony przed nieupoważnioną ingerencją, gdy bagaż:",a:["a) znajduje się w części krytycznej strefy zastrzeżonej","b) znajduje się w strefie zastrzeżonej","c) znajduje się w strefie operacyjnej lotniska","d) znajduje się w strefie ogólnodostępnej"]},

{q:"38. Kontroli bezpieczeństwa nie poddaje się członków oficjalnych delegacji:",a:["a) Wiceprezesa Rady Ministrów","b) Prezesa Rady Ministrów","c) Wicemarszałek sejmu","d) marszałka Sejmiku Województwa"]},

{q:"40. Do podstawowych metod kontroli bezpieczeństwa przedmiotów przenoszonych przez osoby niebędące pasażerami zaliczamy:",a:["a) MDE","b) RTG","c) APID+ETD","d) kontrolę manualną"]}
];

const answers = {
1:["d"],2:["c","d"],3:["b","c"],4:["d"],5:["a","b"],6:["a","b"],
7:["a","b","c","d"],8:["a","b","c"],9:["b","c"],10:["a","c","d"],
11:["c"],12:["a","b","c"],13:["a","b","d"],14:["b","c","d"],
15:["c"],16:["b","c","d"],17:["b"],18:["b","d"],19:["a","b","d"],
20:["a","b","c","d"],21:["d"],22:["a","b","d"],23:["a","b","c"],
24:["a","c"],25:["a","b","c","d"],26:["c"],27:["d"],28:["b","d"],
29:["a","d"],30:["a","b","c","d"],31:["a","c"],32:["a","c","d"],
33:["b","d"],34:["a"],35:["a","c","d"],36:["a","b","c"],
37:["a","d"],38:["a","b"],39:["a","b","c"],40:["b","d"]
};

// ===== RENDER =====
function render(){
checked=false;

let q = questions[current];

let html = `<h3>${q.q}</h3>`;

q.a.forEach((opt,i)=>{
let l = ["a","b","c","d"][i];

let active = (user[current] || []).includes(l) ? "active" : "";

html += `<div class="option ${active}" onclick="toggle('${l}')">${opt}</div>`;
});

document.getElementById("card").innerHTML = html;

updateUI();
}

// ===== TOGGLE =====
function toggle(l){
if(!user[current]) user[current]=[];

if(user[current].includes(l)){
user[current]=user[current].filter(x=>x!==l);
}else{
user[current].push(l);
}

render();
}

// ===== CHECK =====
function check(){
checked=true;

let correct = answers[current+1] || [];
let chosen = user[current] || [];

document.querySelectorAll(".option").forEach((el,i)=>{
let l=["a","b","c","d"][i];

if(correct.includes(l)) el.classList.add("correct");
else if(chosen.includes(l)) el.classList.add("wrong");
});
}

// ===== NAV =====
function next(){
if(current<questions.length-1){
current++;
render();
}
}

function prev(){
if(current>0){
current--;
render();
}
}

// ===== UI =====
function updateUI(){
document.getElementById("progressText").innerText = `${current+1}/${questions.length}`;
document.getElementById("bar").style.width = ((current+1)/questions.length*100)+"%";

let score=0;
for(let i=0;i<questions.length;i++){
let u=user[i]||[];
let c=answers[i+1]||[];
if(JSON.stringify(u.sort())===JSON.stringify(c.sort())) score++;
}

document.getElementById("score").innerText = `Wynik: ${score}/${questions.length}`;
}

// ===== FINISH =====
function finish(){
let score=0;

for(let i=0;i<questions.length;i++){
let u=user[i]||[];
let c=answers[i+1]||[];

if(JSON.stringify(u.sort())===JSON.stringify(c.sort())){
score++;
}
}

alert(`Wynik końcowy: ${score}/${questions.length}`);
}

// INIT
render();

</script>
</body>
</html>
